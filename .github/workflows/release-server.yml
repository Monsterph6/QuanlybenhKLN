name: Build and Release (Server)

on:
  push:
    tags:
      - "server-v*.*.*"
  workflow_dispatch:
    # Cho phep chay thu cong tu tab Actions (khong can day tag) - dung khi
    # muon build thu 1 lan de kiem tra truoc khi tag chinh thuc. Phien ban
    # lay tu VERSION_SERVER.txt trong repo (khac voi khi chay qua tag, lay
    # tu ten tag).

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-server.txt
          pip install pyinstaller

      - name: Xac dinh phien ban va tag
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = (Get-Content VERSION_SERVER.txt -Raw).Trim()
            $tag = "server-v$version"
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag -replace '^server-v', ''
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build Service + Tray exe
        run: |
          python -m PyInstaller --noconfirm --onedir --console --hidden-import=win32timezone --contents-directory _internal_service --name QuanLyBenhNhanTHA-Service --distpath dist_server_raw --workpath build_server service.py
          python -m PyInstaller --noconfirm --onedir --windowed --hidden-import=win32timezone --contents-directory _internal_tray --name QuanLyBenhNhanTHA-Tray --distpath dist_server_raw --workpath build_server server_tray.py

      - name: Gom Service + Tray + script cai dat vao 1 thu muc
        run: |
          New-Item -ItemType Directory -Path dist_server | Out-Null
          Copy-Item dist_server_raw\QuanLyBenhNhanTHA-Service\* dist_server\ -Recurse
          Copy-Item dist_server_raw\QuanLyBenhNhanTHA-Tray\* dist_server\ -Recurse
          Copy-Item install_server.bat, uninstall_server.bat, update_server.bat, update_server.ps1, VERSION_SERVER.txt, README.md dist_server\

      - name: Zip build output (ban portable, cau truc phang)
        run: |
          Compress-Archive -Path dist_server\* -DestinationPath QuanLyBenhNhanTHA-Server-${{ steps.ver.outputs.tag }}.zip

      - name: Build installer (Setup.exe) voi Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} setup_server.iss

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.ver.outputs.tag }} `
            --target ${{ github.sha }} `
            "QuanLyBenhNhanTHA-Server-${{ steps.ver.outputs.tag }}.zip" `
            "setup_output\QuanLyBenhNhanTHA-Server-Setup-*.exe" `
            --title "QuanLyBenhNhanTHA Server ${{ steps.ver.outputs.tag }}" `
            --notes "Ban cap nhat goi MAY CHU (Windows Service + tray helper) duoc build tu dong tu commit ${{ github.sha }}. Day la dong phien ban RIENG voi ung dung may tram (tag 'v*.*.*').`n`n- **QuanLyBenhNhanTHA-Server-Setup-*.exe**: file cai dat (dung Inno Setup, tu hoi cong LAN va tu cai/bat Windows Service, can quyen Administrator) - dung cho lan dau tien tren may moi (khuyen nghi).`n- **QuanLyBenhNhanTHA-Server-*.zip**: ban portable, dung lam nguon cho update_server.bat tu tai khi co ban moi, hoac cai thu cong qua install_server.bat."
