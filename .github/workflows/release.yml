name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed --name QuanLyBenhNhanTHA --distpath dist --workpath build app.py

      - name: Zip build output (ban portable, cau truc phang)
        run: |
          Compress-Archive -Path dist\QuanLyBenhNhanTHA\* -DestinationPath QuanLyBenhNhanTHA-${{ github.ref_name }}.zip

      - name: Build installer (Setup.exe) voi Inno Setup
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version setup.iss

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} `
            "QuanLyBenhNhanTHA-${{ github.ref_name }}.zip" `
            "setup_output\QuanLyBenhNhanTHA-Setup-*.exe" `
            --title "QuanLyBenhNhanTHA ${{ github.ref_name }}" `
            --notes "Ban cap nhat duoc build tu dong boi GitHub Actions tu commit ${{ github.sha }}.`n`n- **QuanLyBenhNhanTHA-Setup-*.exe**: file cai dat, dung cho lan dau tien tren may moi (khuyen nghi).`n- **QuanLyBenhNhanTHA-*.zip**: ban portable, giai nen la chay duoc, dung de tu cap nhat thu cong neu can."
