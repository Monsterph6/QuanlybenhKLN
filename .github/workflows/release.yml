name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    # Cho phep chay thu cong tu tab Actions (khong can day tag) - dung khi
    # muon build thu 1 lan de kiem tra truoc khi tag chinh thuc. Phien ban
    # lay tu VERSION.txt trong repo (khac voi khi chay qua tag, lay tu ten tag).

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Xac dinh phien ban va tag
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = (Get-Content VERSION.txt -Raw).Trim()
            $tag = "v$version"
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag -replace '^v', ''
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build app + Service + Tray exe
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed --exclude-module numpy --name QuanLyBenhNhanTHA --distpath dist_raw --workpath build app.py
          python -m PyInstaller --noconfirm --onedir --console --hidden-import=win32timezone --exclude-module numpy --exclude-module openpyxl --contents-directory _internal_service --name QuanLyBenhNhanTHA-Service --distpath dist_raw --workpath build service.py
          python -m PyInstaller --noconfirm --onedir --windowed --hidden-import=win32timezone --exclude-module numpy --exclude-module openpyxl --contents-directory _internal_tray --name QuanLyBenhNhanTHA-Tray --distpath dist_raw --workpath build server_tray.py

      - name: Gom tat ca vao 1 thu muc dist\QuanLyBenhNhanTHA\
        run: |
          New-Item -ItemType Directory -Path dist\QuanLyBenhNhanTHA | Out-Null
          Copy-Item dist_raw\QuanLyBenhNhanTHA\* dist\QuanLyBenhNhanTHA\ -Recurse
          Copy-Item dist_raw\QuanLyBenhNhanTHA-Service\* dist\QuanLyBenhNhanTHA\ -Recurse
          Copy-Item dist_raw\QuanLyBenhNhanTHA-Tray\* dist\QuanLyBenhNhanTHA\ -Recurse

      - name: Zip build output (ban portable, cau truc phang)
        run: |
          Compress-Archive -Path dist\QuanLyBenhNhanTHA\* -DestinationPath QuanLyBenhNhanTHA-${{ steps.ver.outputs.tag }}.zip

      - name: Build installer (Setup.exe) voi Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} setup.iss

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.ver.outputs.tag }} `
            --target ${{ github.sha }} `
            "QuanLyBenhNhanTHA-${{ steps.ver.outputs.tag }}.zip" `
            "setup_output\QuanLyBenhNhanTHA-Setup-*.exe" `
            --title "QuanLyBenhNhanTHA ${{ steps.ver.outputs.tag }}" `
            --notes "Ban cap nhat duoc build tu dong boi GitHub Actions tu commit ${{ github.sha }}. Gom ca ung dung chinh lan thanh phan May chu (Windows Service chia se qua mang LAN) trong 1 file cai dat duy nhat - khi cai dat se hoi chon vai tro: Mot may / May tram / May chu.`n`n- **QuanLyBenhNhanTHA-Setup-*.exe**: file cai dat (can quyen Administrator), dung cho lan dau tien tren may moi (khuyen nghi).`n- **QuanLyBenhNhanTHA-*.zip**: ban portable, giai nen la chay duoc, dung de tu cap nhat thu cong neu can."
